name: Update Flood Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  # This clears out the Node.js deprecation warning by forcing Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        # REMOVED the cache: 'pip' line to stop the runner from crashing

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Fallback logic: Try installing from requirements.txt, 
        # but install manually if the file is misplaced.
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          pip install aiohttp folium nest_asyncio
        fi

    - name: Run Flood Dashboard Script
      run: python days_to_crest.py # Make sure this matches your exact Python file name

    - name: Commit and Push Updated Dashboard
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add index.html gauge_metadata_cache_all.json
        
        if git diff-index --quiet HEAD; then
          echo "No changes detected. Skipping push."
        else
          git commit -m "Automated dashboard update: $(date -u) UTC"
          git push
        fi
