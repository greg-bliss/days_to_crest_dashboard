name: Update Flood Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  update-map:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # <-- THIS IS THE MAGIC LINE

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          pip install aiohttp folium nest_asyncio
        fi

    - name: Run Flood Dashboard Script
      run: python days_to_crest_1.0.py

    - name: Commit and Push Updated Dashboard
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # --- FIXED: Only add the index.html file, ignore the heavy json cache ---
        git add index.html
        
        if git diff-index --quiet HEAD; then
          echo "No changes detected. Skipping push."
        else
          git commit -m "Automated dashboard update: $(date -u) UTC"
          git push
        fi
