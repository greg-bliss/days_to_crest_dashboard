# Use the official Python docker image
image: python:3.10

# Cache the metadata file so it carries over between hourly runs
cache:
  paths:
    - gauge_metadata_cache_all.json

stages:
  - generate_map
  - deploy

run_python_script:
  stage: generate_map
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - python main.py # CHANGE THIS to the actual name of your script
  artifacts:
    paths:
      - index.html
    expire_in: 1 day # Saves space, we only need it long enough to pass to the Pages job

# This specific job name "pages" is required by GitLab to host a website
pages:
  stage: deploy
  script:
    - mkdir -p public
    - mv index.html public/
  artifacts:
    paths:
      - public
  only:
    - main # Only deploys the site if the script ran on the main branch
